# Anthropic API key — get this from console.anthropic.com
ANTHROPIC_API_KEY=sk-ant-YOUR_KEY_HERE

# Frontend URL for CORS — set to your Vercel/Netlify URL in production
# Use * for local development
FRONTEND_URL=*

# Port (Railway sets this automatically)
PORT=3001

# Database path (Railway uses /data for persistent storage)
DB_PATH=./data/impossible-jobs.db
